server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;
    charset utf-8;
    absolute_redirect off;

    # Pass-through: no rewrites for these paths
    location /towebmail/ {
        try_files $uri $uri/ =404;
    }

    location = /google-maps/superfil.html {
        try_files $uri =404;
    }

    # SPA landings — serve from Vite dist/
    location /landings/tubos-pvc/ {
        alias /var/www/html/landings/tubos-pvc/dist/;
        try_files $uri $uri/ /landings/tubos-pvc/dist/index.html;
    }

    location /landings/cielorrasos/ {
        alias /var/www/html/landings/cielorrasos/dist/;
        try_files $uri $uri/ /landings/cielorrasos/dist/index.html;
    }

    # PHP in landings/
    location ~ ^/landings/.*\.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Main app: URL rewrites translated from .htaccess
    location / {
        # /linea/codigo/producto.html → detalle-producto.php
        rewrite ^/([^/]+)/([^/]+)/([^/]+)\.html$ /detalle-producto.php?linea_rs=$1&url=$2&codigo=$3 last;
        # /linea/producto.html → listado-producto.php
        rewrite ^/([^/]+)/([^/]+)\.html$ /listado-producto.php?linea_rs=$1&ruta=$2 last;
        # extension-less URLs → try as .php
        try_files $uri $uri/ $uri.php?$query_string =404;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}
